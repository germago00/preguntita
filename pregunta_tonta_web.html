<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Pregunta tonta</title>

  <style>
    :root {
      --bg1: #f7d9ff;
      --bg2: #d6f0ff;
      --card: rgba(255, 255, 255, 0.96);
      --text: #222;
      --yes: #37c978;
      --no: #ff5f6d;
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      color: var(--text);
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      display: grid;
      place-items: center;
    }

    .card {
      width: min(92vw, 460px);
      padding: 36px 26px 26px;
      background: var(--card);
      border-radius: 26px;
      box-shadow: var(--shadow);
      text-align: center;
      position: relative;
      z-index: 2;
      backdrop-filter: blur(8px);
    }

    h1 {
      margin: 0 0 26px;
      font-size: clamp(22px, 4vw, 30px);
      line-height: 1.2;
    }

    .buttons {
      height: 76px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 18px;
    }

    button {
      border: 0;
      padding: 14px 28px;
      font-size: 18px;
      font-weight: 700;
      border-radius: 999px;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      transition: transform 0.14s ease, box-shadow 0.14s ease;
    }

    button:active {
      transform: scale(0.98);
    }

    #yesBtn {
      background: var(--yes);
      color: #fff;
      box-shadow: 0 10px 20px rgba(55, 201, 120, 0.28);
    }

    #yesBtn:hover {
      transform: scale(1.05);
    }

    /*
      Importante:
      El botón NO está fijo desde el principio.
      Así evitamos el bug de que desaparezca al cambiar de position: relative a fixed.
    */
    #noBtn {
      background: var(--no);
      color: #fff;
      box-shadow: 0 10px 20px rgba(255, 95, 109, 0.22);
      position: fixed;
      left: 0;
      top: 0;
      z-index: 50;
      visibility: hidden;
      transition: none;
    }

    #noBtn:hover {
      transform: scale(1.05);
    }

    .hint {
      margin-top: 14px;
      font-size: 12px;
      color: rgba(0, 0, 0, 0.45);
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
      padding: 20px;
    }

    .overlay.active {
      display: flex;
    }

    .popup {
      width: min(92vw, 420px);
      background: #fff;
      border-radius: 26px;
      box-shadow: 0 25px 70px rgba(0, 0, 0, 0.25);
      text-align: center;
      padding: 34px 24px 26px;
      animation: pop 0.22s ease;
    }

    .popup h2 {
      margin: 0 0 12px;
      font-size: clamp(26px, 5vw, 34px);
    }

    .popup p {
      margin: 0 0 22px;
      font-size: 18px;
      line-height: 1.4;
      color: #444;
    }

    .popup button {
      background: var(--yes);
      color: #fff;
      box-shadow: 0 10px 20px rgba(55, 201, 120, 0.25);
    }

    @keyframes pop {
      from {
        transform: scale(0.85);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .confetti {
      position: fixed;
      top: -16px;
      width: 10px;
      height: 16px;
      border-radius: 3px;
      pointer-events: none;
      z-index: 1000;
      animation: fall linear forwards;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh) rotate(720deg);
        opacity: 0.85;
      }
    }

    @media (max-width: 420px) {
      .card {
        padding: 30px 18px 22px;
      }

      .buttons {
        gap: 12px;
        height: 72px;
      }

      button {
        padding: 13px 22px;
        font-size: 17px;
      }
    }
  </style>
</head>

<body>
  <main class="card" aria-label="Pregunta principal">
    <h1>¿Quieres verme hoy?</h1>

    <div class="buttons">
      <button id="yesBtn" type="button">Sí</button>
    </div>

    
  </main>

  <button id="noBtn" type="button">No</button>

  <section class="overlay" id="overlay" aria-hidden="true">
    <div class="popup" role="dialog" aria-modal="true" aria-labelledby="popupTitle">
      <h2 id="popupTitle">🎉 Enhorabuena</h2>
      <p>Pues yo no</p>
      <button id="closeBtn" type="button">Cerrar</button>
    </div>
  </section>

  <script>
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const overlay = document.getElementById("overlay");
    const closeBtn = document.getElementById("closeBtn");

    const PADDING = 14;
    const DESKTOP_TRIGGER_DISTANCE = 145;
    const TOUCH_TRIGGER_DISTANCE = 170;
    const JUMP_COOLDOWN_MS = 90;

    let noX = 0;
    let noY = 0;
    let lastJumpAt = 0;

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function getNoSize() {
      return {
        width: noBtn.offsetWidth || 70,
        height: noBtn.offsetHeight || 50
      };
    }

    function setNoPosition(x, y) {
      const size = getNoSize();

      const maxX = Math.max(PADDING, window.innerWidth - size.width - PADDING);
      const maxY = Math.max(PADDING, window.innerHeight - size.height - PADDING);

      noX = clamp(x, PADDING, maxX);
      noY = clamp(y, PADDING, maxY);

      noBtn.style.left = noX + "px";
      noBtn.style.top = noY + "px";
      noBtn.style.visibility = "visible";
    }

    function randomPositionAwayFrom(pointerX, pointerY) {
      const size = getNoSize();
      const maxX = Math.max(PADDING, window.innerWidth - size.width - PADDING);
      const maxY = Math.max(PADDING, window.innerHeight - size.height - PADDING);

      let bestX = PADDING;
      let bestY = PADDING;
      let bestDistance = -1;

      /*
        Probamos varias posiciones aleatorias y elegimos la más alejada del puntero.
        Así nunca se sale de la pantalla y no desaparece.
      */
      for (let i = 0; i < 24; i++) {
        const candidateX = PADDING + Math.random() * Math.max(1, maxX - PADDING);
        const candidateY = PADDING + Math.random() * Math.max(1, maxY - PADDING);

        const candidateCenterX = candidateX + size.width / 2;
        const candidateCenterY = candidateY + size.height / 2;
        const distance = Math.hypot(candidateCenterX - pointerX, candidateCenterY - pointerY);

        if (distance > bestDistance) {
          bestDistance = distance;
          bestX = candidateX;
          bestY = candidateY;
        }
      }

      return { x: bestX, y: bestY };
    }

    function jumpNoButton(pointerX, pointerY) {
      const now = Date.now();

      if (now - lastJumpAt < JUMP_COOLDOWN_MS) {
        return;
      }

      lastJumpAt = now;

      const next = randomPositionAwayFrom(pointerX, pointerY);
      setNoPosition(next.x, next.y);
    }

    function distanceToNoButton(pointerX, pointerY) {
      const size = getNoSize();
      const centerX = noX + size.width / 2;
      const centerY = noY + size.height / 2;

      return Math.hypot(pointerX - centerX, pointerY - centerY);
    }

    function placeNoButtonAtStart() {
      const yesRect = yesBtn.getBoundingClientRect();
      const size = getNoSize();

      const startX = yesRect.right + 18;
      const startY = yesRect.top + (yesRect.height - size.height) / 2;

      setNoPosition(startX, startY);
    }

    function showPopup() {
      overlay.classList.add("active");
      overlay.setAttribute("aria-hidden", "false");
      createConfetti();
    }

    function hidePopup() {
      overlay.classList.remove("active");
      overlay.setAttribute("aria-hidden", "true");
    }

    yesBtn.addEventListener("click", showPopup);

    closeBtn.addEventListener("click", hidePopup);

    overlay.addEventListener("click", (event) => {
      if (event.target === overlay) {
        hidePopup();
      }
    });

    document.addEventListener("mousemove", (event) => {
      if (distanceToNoButton(event.clientX, event.clientY) < DESKTOP_TRIGGER_DISTANCE) {
        jumpNoButton(event.clientX, event.clientY);
      }
    });

    document.addEventListener("pointermove", (event) => {
      if (event.pointerType !== "touch") return;

      if (distanceToNoButton(event.clientX, event.clientY) < TOUCH_TRIGGER_DISTANCE) {
        jumpNoButton(event.clientX, event.clientY);
      }
    }, { passive: true });

    noBtn.addEventListener("mouseenter", (event) => {
      jumpNoButton(event.clientX, event.clientY);
    });

    noBtn.addEventListener("pointerdown", (event) => {
      event.preventDefault();
      jumpNoButton(event.clientX, event.clientY);
    });

    noBtn.addEventListener("click", (event) => {
      event.preventDefault();
      jumpNoButton(event.clientX, event.clientY);
    });

    window.addEventListener("resize", () => {
      setNoPosition(noX, noY);
    });

    window.addEventListener("load", placeNoButtonAtStart);

    /*
      Por si el navegador ya ha cargado antes de llegar aquí.
    */
    requestAnimationFrame(placeNoButtonAtStart);

    function createConfetti() {
      const colors = ["#ff5f6d", "#37c978", "#ffd166", "#8e7dff", "#2ec4ff"];
      const count = 40;

      for (let i = 0; i < count; i++) {
        const piece = document.createElement("div");
        piece.className = "confetti";
        piece.style.left = Math.random() * 100 + "vw";
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDuration = (2.5 + Math.random() * 1.8) + "s";
        piece.style.animationDelay = Math.random() * 0.2 + "s";
        piece.style.transform = "translateY(0) rotate(" + Math.random() * 360 + "deg)";

        document.body.appendChild(piece);

        setTimeout(() => {
          piece.remove();
        }, 5000);
      }
    }
  </script>
</body>
</html>
